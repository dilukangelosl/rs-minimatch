name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace
      - name: Clippy (core + cli)
        run: cargo clippy -p rs-minimatch-core -p rs-minimatch-cli --all-targets -- -D warnings

  node-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build native addon (debug)
        run: node packages/rs-minimatch/build.js
        env:
          RS_MINIMATCH_PROFILE: debug
      - name: Smoke test
        run: |
          node -e "
            const minimatch = require('./packages/rs-minimatch');
            const assert = require('assert');
            assert.strictEqual(minimatch('src/index.js', 'src/**/*.js'), true);
            assert.deepStrictEqual(minimatch.match(['a.js', 'a.ts'], '*.js'), ['a.js']);
            assert.strictEqual(new minimatch.Minimatch('*.js').match('a.js'), true);
            console.log('node smoke test passed');
          "
